<!DOCTYPE html>
<html>
<head>
    <title>Pune Trip Invitation</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #fce4ec; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { padding: 15px 30px; font-size: 20px; margin: 10px; cursor: pointer; border: none; border-radius: 10px; }
        #yesBtn { background-color: #ec407a; color: white; }
        #noBtn { background-color: #eee; position: relative; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Will you come to Pune with me, Arpit? 🌸</h1>
        <button id="yesBtn" onclick="alert('Yay! See you in Pune! ❤️')">YES</button>
        <button id="noBtn" onmouseover="moveButton()">NO</button>
    </div>

    <script>
        function moveButton() {
            var btn = document.getElementById("noBtn");
            btn.style.position = "absolute";
            // Randomly moves the button when hovered
            btn.style.top = Math.random() * (window.innerHeight - 50) + "px";
            btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
        }
    </script>
</body>
</html>
